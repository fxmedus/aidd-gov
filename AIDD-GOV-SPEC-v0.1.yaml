# EXTENSIBILITY
# =============================================================================

extensibility:
  custom_schemas: >
    Implementations MAY define additional schemas beyond those in this
    specification. Custom schemas MUST NOT conflict with AIDD-GOV schema
    names. RECOMMENDED: prefix custom schemas with an organization
    identifier (e.g., "ACME_CustomAlert").
  domain_adaptation: >
    The reference pipeline (S00-S10) is designed for small-molecule drug
    discovery. Implementations targeting biologics, peptides, gene therapy,
    or other modalities MAY define alternative stage sequences while
    maintaining the governance invariants: ordered stages, SDR gating,
    platform authority, and immutable audit trail.
  versioning: >
    This specification follows Semantic Versioning (semver.org).
    Breaking changes increment the major version. New optional schemas
    increment the minor version. Clarifications increment the patch version.

